    <tr><th>Professeur</th><th>Date</th><th>Durée</th><th>Lieu</th><th>Adresse</th><th>Statut</th><th>Notes</th></tr>
    <?php if (!$cours): ?>
    <tr><td colspan="7">Aucun cours réservé.</td></tr>

    <tr>
        <td><?= htmlspecialchars($c['prenom_prof']." ".$c['nom_prof']) ?></td>
