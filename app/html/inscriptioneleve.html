<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Document</title>
</head>
<body>
<h1>Je suis élèves </h1>


<form action="../php/inscriptioneleve.php" method="POST">
  <label for="nom">Nom :</label>
  <input type="text" id="nom" name="nom" required><br><br>

  <label for="prenom">Prénom :</label>
  <input type="text" id="prenom" name="prenom" required><br><br>

  <label for="email">Email :</label>
  <input type="email" id="email" name="email" required><br><br>

  <label for="mot_de_passe">Mot de passe :</label>
  <input type="password" id="mot_de_passe" name="mot_de_passe" required><br><br>

  <label for="date_naissance">Date de naissance :</label>
  <input type="date" id="date_naissance" name="date_naissance"><br><br>

  <label for="adresse">Adresse :</label>
  <textarea id="adresse" name="adresse" required></textarea><br><br>

  <label for="ville">Ville :</label>
  <input type="text" id="ville" name="ville" required><br><br>

  <label for="code_postal">Code postal :</label>
  <input type="text" id="code_postal" name="code_postal" maxlength="5" required><br><br>

  <label for="telephone">Téléphone :</label>
  <input type="tel" id="telephone" name="telephone" required><br><br>

  <label for="niveau_scolaire">Niveau scolaire :</label>
  <select id="niveau_scolaire" name="niveau_scolaire" required>
    <option value="collége">Collège</option>
    <option value="lycée">Lycée</option>
  </select><br><br>

  <label for="classe">Classe :</label>
  <input type="text" id="classe" name="classe" required><br><br>

  <label for="etablissement">Établissement :</label>
  <input type="text" id="etablissement" name="etablissement"><br><br>

  <h3>Informations parent</h3>

  <label for="nom_parent">Nom du parent :</label>
  <input type="text" id="nom_parent" name="nom_parent" required><br><br>

  <label for="telephone_parent">Téléphone du parent :</label>
  <input type="tel" id="telephone_parent" name="telephone_parent" required><br><br>

  <label for="email_parent">Email du parent :</label>
  <input type="email" id="email_parent" name="email_parent" required><br><br>

  <label for="besoins_particuliers">Besoins particuliers :</label>
  <textarea id="besoins_particuliers" name="besoins_particuliers" required></textarea><br><br>

  <button type="submit">Enregistrer</button>
</form>

</body>
</html>
